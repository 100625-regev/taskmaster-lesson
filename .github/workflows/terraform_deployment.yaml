name: Say Hello

on:
  push:
    branches:
      - main

jobs:
  print-hello:
    runs-on: ubuntu-latest

    steps:

      - name: first step
        run: |
          ls -al
          echo '######################'
          pwd
          echo '######################'        

      - name: second step
        uses: actions/checkout@v4

      - name: debug step
        continue-on-error: true
        run: |
          terraform --version

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.14.7"

      - name: debug step
        run: |
          terraform --version

      - name: terraform-init-plan 
        run: |
          export AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY }}
          export AWS_SECRET_ACCESS_KEY=${{ secrets.SECRET_ACCESS_KEY }}
          export AWS_REGION=us-east-1
          terraform init
          terraform plan