  push:
    branches:
      - main
    paths:
      - 'terraform/**'

jobs:
  echo_hello_world:
    runs-on: ubuntu-latest
    steps:
      - name: Check code
        uses: actions/checkout@v4
        
      - uses: hashicorp/setup-terraform@v4
